  flutter_local_notifications: ^19.1.0
  file_saver: ^0.2.14
  flutter_downloader: ^1.12.0
  mobile_scanner: ^5.2.3
  google_mlkit_barcode_scanning: ^0.12.0
  camera: ^0.11.0+2
  shared_preferences: ^2.5.4
  connectivity_plus: ^6.0.5
  video_player: ^2.9.2
  chewie: ^1.8.5
  syncfusion_flutter_pdfviewer: ^28.1.35
  # removed open_file to avoid conflict with open_filex (open_filex is used)
  flutter_overlay_window: ^0.5.0
  battery_plus: ^7.0.0
  open_filex: ^4.7.0
  ffmpeg_kit_flutter_new: ^4.1.0
