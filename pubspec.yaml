dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/google_logo.png
    - assets/images/yahoo_logo.png
    - assets/images/bing_logo.png
    - assets/images/duckduckgo_logo.png
    - assets/images/ecosia_logo.png
    - assets/icon/icon.png

